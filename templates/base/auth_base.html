<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Neuronet A.I{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth-base.css') }}">
    {% block head %}{% endblock %}
  </head>
  <body class="auth-layout">
    <header class="auth-topbar">
      <a href="/" class="brand">
        <div class="logo">
          <img src="{{ url_for('static', filename='img/neuronet_ai.png') }}" alt="Neuronet" style="width:100%;height:100%;object-fit:cover;display:block;" />
        </div>
        <span>Neuronet A.I</span>
      </a>
      <div class="right-tools">
        <a href="/login" class="text-white text-decoration-none small"><i class="fa-solid fa-circle-user me-2"></i>Sign In</a>
      </div>
    </header>
    
    <main class="main-content">
      {% block content %}{% endblock %}
    </main>
    
    <footer class="auth-footer">
      Powered by Neuronet A.I © 2026
    </footer>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
