{% extends 'base/kitchen_base.html' %}

{% block title %}Kitchen Orders — Resto{% endblock %}

{% block head %}
{{ super() }}

    <link rel="stylesheet" href="{{ url_for('static', filename='css/kitchen.css') }}">
{% endblock %}

{% block content %}
<div class="kitchen-container">
    <div class="kitchen-header">
        <div>
            <h1>Kitchen Orders</h1>
            <div style="color: #666; font-size: 14px;">
                Auto-updating <span class="auto-update-indicator"></span>
            </div>
        </div>
        <div class="filter-buttons">
            <button class="filter-btn active" data-status="all">All Orders</button>
            <button class="filter-btn" data-status="pending">Pending</button>
            <button class="filter-btn" data-status="preparing">Preparing</button>
            <button class="filter-btn" data-status="ready">Ready</button>
        </div>
    </div>

    <div class="stats-bar" id="statsBar">
        <div class="stat">
            <span>Pending</span>
            <span class="stat-number" id="statPending">0</span>
        </div>
        <div class="stat">
            <span>Preparing</span>
            <span class="stat-number" id="statPreparing">0</span>
        </div>
        <div class="stat">
            <span>Ready</span>
            <span class="stat-number" id="statReady">0</span>
        </div>
        <div class="stat">
            <span>Completed</span>
            <span class="stat-number" id="statCompleted">0</span>
        </div>
    </div>

    <div id="ordersContainer" class="orders-grid">
        <!-- Orders will be populated here -->
    </div>

    <div id="emptyState" class="empty-state" style="display: none;">
        <div class="empty-state-icon">📭</div>
        <div class="empty-state-text">No orders yet</div>
    </div>
</div>

<script>
(function(){
const ordersContainer = document.getElementById('ordersContainer');
const emptyState = document.getElementById('emptyState');
const statPending = document.getElementById('statPending');
const statPreparing = document.getElementById('statPreparing');
const statReady = document.getElementById('statReady');
const statCompleted = document.getElementById('statCompleted');

if (!ordersContainer || !emptyState) {
    // Not on the kitchen page; avoid attaching intervals or handlers.
    return;
}

if (window.ordersScriptInitialized) {
    return;
}
window.ordersScriptInitialized = true;

let currentFilter = 'all';
let allOrders = [];

const filterButtons = document.querySelectorAll('.filter-btn');
filterButtons.forEach(btn => {
    btn.addEventListener('click', () => {
        filterButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.status;
        renderOrders();
    });
});

async function fetchOrders() {
    try {
        const response = await fetch('/api/orders/list');
        const data = await response.json();
        if (data.success) {
            allOrders = data.orders;
            renderOrders();
            updateStats();
        }
    } catch (error) {
        console.error('Failed to fetch orders:', error);
    }
}

function formatTime(isoString) {
    const date = new Date(isoString);
    return date.toLocaleTimeString('en-US', { 
        hour: '2-digit', 
        minute: '2-digit',
        hour12: true 
    });
}

function formatDate(isoString) {
    const date = new Date(isoString);
    const now = new Date();
    const mins = Math.floor((now - date) / 60000);
    
    if (mins < 1) return 'Just now';
    if (mins < 60) return `${mins}m ago`;
    
    const hours = Math.floor(mins / 60);
    if (hours < 24) return `${hours}h ago`;
    
    return date.toLocaleDateString();
}

function renderOrders() {
    const container = ordersContainer;
    
    let filteredOrders = allOrders;
    if (currentFilter !== 'all') {
        filteredOrders = allOrders.filter(order => order.status === currentFilter);
    }

    if (filteredOrders.length === 0) {
        container.style.display = 'none';
        emptyState.style.display = 'block';
        return;
    }

    container.style.display = 'grid';
    emptyState.style.display = 'none';

    container.innerHTML = filteredOrders.map(order => {
        const items = Array.isArray(order.items) ? order.items : 
                     (typeof order.items === 'string' ? JSON.parse(order.items) : []);
        
        const itemsHtml = items.map(item => `
            <div class="item">
                <div class="item-name">${item.name}</div>
                <div class="item-quantity">Qty: ${item.quantity} × ${item.price || 0}</div>
            </div>
        `).join('');

        const statusActions = {
            pending: `<button class="action-btn preparing" onclick="updateOrderStatus('${order.id}', 'preparing')">Start Preparing</button>`,
            preparing: `<button class="action-btn ready" onclick="updateOrderStatus('${order.id}', 'ready')">Ready for Pickup</button>`,
            ready: `<button class="action-btn complete" onclick="updateOrderStatus('${order.id}', 'completed')">Completed</button>`,
            completed: `<button class="action-btn" style="background: #ccc; cursor: default;" disabled>Order Complete</button>`
        };

        return `
            <div class="order-card ${order.status}">
                <div class="order-header">
                    <div>
                        <div class="order-number">Order #${order.order_number}</div>
                        <div class="order-time">${formatDate(order.created_at)}</div>
                    </div>
                </div>
                <div class="order-body">
                    <div class="status-badge ${order.status}">${order.status}</div>
                    <div class="order-customer">
                        <div class="customer-name">${order.customer_name}</div>
                        <div class="table-number">Table ${order.table_number}</div>
                    </div>
                    <div class="order-items">
                        ${itemsHtml}
                    </div>
                    <div class="order-total">Total: {{ cfg.get('currency_symbol', '₱') }}${parseFloat(order.total_amount).toFixed(2)}</div>
                    <div class="action-buttons">
                        ${statusActions[order.status] || ''}
                    </div>
                </div>
            </div>
        `;
    }).join('');
}

function updateStats() {
    if (!statPending || !statPreparing || !statReady || !statCompleted) {
        return;
    }
    const stats = {
        pending: allOrders.filter(o => o.status === 'pending').length,
        preparing: allOrders.filter(o => o.status === 'preparing').length,
        ready: allOrders.filter(o => o.status === 'ready').length,
        completed: allOrders.filter(o => o.status === 'completed').length
    };

    statPending.textContent = stats.pending;
    statPreparing.textContent = stats.preparing;
    statReady.textContent = stats.ready;
    statCompleted.textContent = stats.completed;
}

async function updateOrderStatus(orderId, newStatus) {
    try {
        const response = await fetch('/api/orders/update-status', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                order_id: orderId,
                status: newStatus
            })
        });

        const data = await response.json();
        if (data.success) {
            // Update local order
            const order = allOrders.find(o => o.id === orderId);
            if (order) {
                order.status = newStatus;
                renderOrders();
                updateStats();
            }
        } else {
            window.appShowAlert('Failed to update order: ' + data.error, 'Update Failed');
        }
    } catch (error) {
        console.error('Failed to update order status:', error);
        window.appShowAlert('Error updating order status', 'Update Failed');
    }
}

// Expose function to global scope for onclick handlers
window.updateOrderStatus = updateOrderStatus;

// Initial load
fetchOrders();

// Auto-refresh every 3 seconds
if (window.ordersRefreshInterval) {
    clearInterval(window.ordersRefreshInterval);
}
window.ordersRefreshInterval = setInterval(fetchOrders, 3000);
})();
</script>
{% endblock %}
