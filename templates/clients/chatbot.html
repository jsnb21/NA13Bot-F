<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Chatbot — Resto</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/neuronet_ai.png') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/chatbot.css')}}?v=20">
    <!-- Dynamic color variables from config -->
    <style>
      :root {
        --main-color: {{ cfg.get('main_color', '#1e40af') }};
        --main-foreground: {{ cfg.get('main_foreground', '#ffffff') }};
        --sub-color: {{ cfg.get('sub_color', '#ffd41d') }};
        --sub-foreground: {{ cfg.get('sub_foreground', '#000000') }};
        --text-primary: #1f2937;
        --text-secondary: {{ cfg.get('text_secondary', '#6b7280') }};
        --light: {{ cfg.get('light', '#f9fafb') }};
        --border: {{ cfg.get('border', '#e5e7eb') }};
        --primary: {{ cfg.get('primary', '#3b82f6') }};
        --primary-light: {{ cfg.get('primary_light', '#60a5fa') }};
        --secondary: {{ cfg.get('secondary', '#fbbf24') }};
        --dark: {{ cfg.get('dark', '#111827') }};
        /* Legacy names for backwards compatibility */
        --accent: {{ cfg.get('main_color', '#1e40af') }};
        --sub-accent: {{ cfg.get('sub_color', '#ffd41d') }};
      }
    </style>
  </head>
  <body>
    <div class="phone" id="phone">
      <div class="header" id="resto-name">
        <div class="header-brand">
          {% if cfg.get('logo_url') %}
            <img src="{{ cfg.get('logo_url') }}" alt="Resto logo" class="header-logo" onerror="this.onerror=null;this.src='{{ url_for('static', filename='uploads/logo.png') }}';">
          {% else %}
            <img src="{{ url_for('static', filename='uploads/logo.png') }}" alt="Resto logo" class="header-logo">
          {% endif %}
          <span id="resto-name-text">Resto Name</span>
        </div>
        <div class="header-actions">
          <span class="order-badge" id="order-number">Order #--</span>
          <button type="button" id="menu-filter-toggle" class="menu-filter-toggle-btn" aria-controls="kiosk-filter-drawer" aria-expanded="false" aria-label="Open menu category filters">
            <span class="menu-filter-icon" aria-hidden="true">☰</span>
            <span class="menu-filter-label">Filter</span>
          </button>
        </div>
      </div>
      <div class="customer-layout">
        <section class="kiosk-priority" aria-label="Mini kiosk ordering section">
          <div id="kiosk-panel" class="kiosk-panel"></div>
        </section>

        <div id="kiosk-filter-backdrop" class="kiosk-filter-backdrop is-closed" aria-hidden="true"></div>
        <aside id="kiosk-filter-drawer" class="kiosk-filter-drawer is-closed" aria-label="Menu filters" aria-hidden="true">
          <div class="kiosk-drawer-header">
            <strong class="kiosk-drawer-header-title">Filter Menu</strong>
            <button type="button" id="kiosk-filter-close" class="kiosk-drawer-close-btn" aria-label="Close menu filters">✕</button>
          </div>
          <div id="kiosk-filter-list"></div>
        </aside>

        <section id="assistant-panel" class="assistant-panel is-closed" aria-label="Chat assistant section" aria-hidden="true">
          <div class="assistant-header">
            <span class="assistant-header-title">Assistant Chat</span>
            <button type="button" id="assistant-close" class="assistant-close-btn" aria-label="Close assistant">✕</button>
          </div>

          <div class="messages" id="messages">
            <div class="message-row bot">
              {% if cfg.get('chatbot_avatar') %}
                <img src="{{ cfg.get('chatbot_avatar') }}" alt="Bot" class="avatar">
              {% else %}
                <img src="{{ url_for('static', filename='img/bot-avatar.svg') }}" alt="Bot" class="avatar">
              {% endif %}
              <div class="bubble bot">Hi! I can assist while you order from the kiosk above.</div>
            </div>

            <div class="typing-indicator" id="typing-indicator" style="display:none;">
              <div class="bubble bot">
                <div class="typing-dots">
                  <span></span>
                  <span></span>
                  <span></span>
                </div>
              </div>
            </div>
          </div>

          <div class="quick-actions">
            <button class="quick-btn" data-action="menu">Go To Kiosk</button>
            <button class="quick-btn" data-action="order">Place Order</button>
            <button class="quick-btn" data-action="hours">Opening Hours</button>
            <button class="quick-btn" data-action="support">Contact Support</button>
          </div>

          <div class="composer">
            <input id="txt" placeholder="Ask the assistant...">
            <button id="send">➤</button>
          </div>
        </section>

        <button type="button" id="assistant-toggle" class="assistant-toggle-btn" aria-controls="assistant-panel" aria-expanded="false">
          <span class="assistant-toggle-label">Chat</span>
          <span id="assistant-unread" class="assistant-unread-dot" style="display:none;">0</span>
        </button>
      </div>
    </div>

    <!-- Theme color utility script -->
    <script>
      /**
       * Calculate luminance of a color to determine if text should be light or dark
       * Based on relative luminance formula from WCAG
       */
      function getLuminance(color) {
        // Handle rgb/rgba format
        if (color.includes('rgb')) {
          const match = color.match(/\d+/g);
          if (!match || match.length < 3) return 0.5;
          const r = parseInt(match[0]) / 255;
          const g = parseInt(match[1]) / 255;
          const b = parseInt(match[2]) / 255;
          
          const luminance = [r, g, b].map(x => {
            return x <= 0.03928 ? x / 12.92 : Math.pow((x + 0.055) / 1.055, 2.4);
          });
          
          return 0.2126 * luminance[0] + 0.7152 * luminance[1] + 0.0722 * luminance[2];
        }
        
        // Handle hex format
        const hex = color.replace('#', '');
        if (hex.length !== 6) return 0.5;
        
        const r = parseInt(hex.substr(0, 2), 16) / 255;
        const g = parseInt(hex.substr(2, 2), 16) / 255;
        const b = parseInt(hex.substr(4, 2), 16) / 255;

        // Apply gamma correction
        const luminance = [r, g, b].map(x => {
          return x <= 0.03928 ? x / 12.92 : Math.pow((x + 0.055) / 1.055, 2.4);
        });

        // Calculate relative luminance
        return 0.2126 * luminance[0] + 0.7152 * luminance[1] + 0.0722 * luminance[2];
      }

      /**
       * Apply dynamic text colors based on background luminance
       */
      function applyDynamicColors() {
        const root = document.documentElement;
        const computedStyle = getComputedStyle(root);
        
        // Get color variables
        const mainColorRaw = computedStyle.getPropertyValue('--main-color').trim();
        const mainColor = mainColorRaw || '#1e40af';
        const mainForeground = computedStyle.getPropertyValue('--main-foreground').trim() || '#ffffff';
        
        // Calculate if main color is light or dark (threshold 0.5)
        const mainLuminance = getLuminance(mainColor);
        const isMainLight = mainLuminance > 0.5;
        
        // Set header text color based on main color luminance
        const headerText = document.getElementById('resto-name-text');
        if (headerText) {
          headerText.style.color = isMainLight ? '#000000' : '#ffffff';
        }
        
        // Update button and badge colors when they use the main color
        document.querySelectorAll('.kiosk-category-btn.is-active, .kiosk-add-btn, .assistant-toggle-btn, .composer button').forEach(el => {
          el.style.color = isMainLight ? '#000000' : '#ffffff';
        });
        
        // Update header elements
        document.querySelectorAll('.order-badge, .menu-filter-toggle-btn').forEach(el => {
          el.style.color = isMainLight ? '#000000' : '#ffffff';
        });
      }

      // Apply colors on page load and also set up a mutation observer for dynamic changes
      function initDynamicColors() {
        applyDynamicColors();
        
        // Re-apply colors when new elements are added (e.g., after menu loads)
        const observer = new MutationObserver(() => {
          applyDynamicColors();
        });
        
        observer.observe(document.body, {
          childList: true,
          subtree: true,
          attributes: true,
          attributeFilter: ['class', 'style']
        });
      }

      // Apply colors on page load
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initDynamicColors);
      } else {
        initDynamicColors();
      }
    </script>

    <script src="{{ url_for('static', filename='js/chatbot.js') }}?v=11"></script>
  </body>
</html>
